<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😍 Cute WhatsApp Stickers Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #25D366, #128C7E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
            margin: 0 30px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
        }

        .search-box input:focus {
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37,211,102,0.1);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .category-btn:hover, .category-btn.active {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .sticker-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .sticker-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .sticker-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .sticker-card:hover .sticker-emoji {
            font-size: 60px;
            transform: rotate(10deg);
        }

        .sticker-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .download-btn {
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(37,211,102,0.4);
        }

        .floating-action {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 1000;
            animation: bounce 2s infinite;
        }

        .floating-action:hover {
            transform: scale(1.1);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-box {
                margin: 0;
                order: 3;
            }
            
            .stickers-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 15px;
            }
            
            .section-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">📱 StickerHub</div>
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search cute stickers... 😍">
            </div>
            <div class="categories">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="happy">😊 Happy</button>
                <button class="category-btn" data-category="funny">😂 Funny</button>
                <button class="category-btn" data-category="love">❤️ Love</button>
                <button class="category-btn" data-category="cute">🐾 Cute</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <h1 class="section-title">Cute & Funny WhatsApp Stickers 🎉</h1>
        
        <div class="stickers-grid" id="stickersGrid">
            <!-- Stickers will be populated by JavaScript -->
        </div>
    </main>

    <button class="floating-action" onclick="showRandomSticker()">
        <i class="fas fa-random"></i>
    </button>

    <div id="stickerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalEmoji" class="sticker-emoji" style="font-size: 100px;"></div>
            <h2 id="modalTitle"></h2>
            <p>Tap to copy emoji! 📋</p>
            <button class="download-btn" onclick="copyEmoji()">Copy Emoji</button>
        </div>
    </div>

    <script>
        const stickers = [
            { emoji: '😍', name: 'Lovable', category: ['happy', 'love', 'cute'] },
            { emoji: '😂', name: 'LOL', category: ['funny'] },
            { emoji: '🥰', name: 'Adorable', category: ['happy', 'love', 'cute'] },
            { emoji: '🤣', name: 'ROFL', category: ['funny'] },
            { emoji: '😘', name: 'Muah!', category: ['love'] },
            { emoji: '😜', name: 'Cheeky', category: ['funny', 'cute'] },
            { emoji: '🙃', name: 'Upside Down', category: ['funny'] },
            { emoji: '🥳', name: 'Party Time', category: ['happy'] },
            { emoji: '😇', name: 'Angel', category: ['cute', 'happy'] },
            { emoji: '🤪', name: 'Crazy', category: ['funny'] },
            { emoji: '😎', name: 'Cool Dude', category: ['funny', 'happy'] },
            { emoji: '💕', name: 'Love Hearts', category: ['love'] },
            { emoji: '😋', name: 'Yummy', category: ['happy', 'cute'] },
            { emoji: '🤗', name: 'Hug', category: ['happy', 'love'] },
            { emoji: '😆', name: 'Big Grin', category: ['happy', 'funny'] },
            { emoji: '🐶', name: 'Puppy Love', category: ['cute'] },
            { emoji: '🐱', name: 'Kitty', category: ['cute'] },
            { emoji: '🦄', name: 'Unicorn', category: ['cute', 'happy'] },
            { emoji: '🌈', name: 'Rainbow', category: ['happy'] },
            { emoji: '✨', name: 'Sparkle', category: ['happy', 'cute'] },
            { emoji: '🎉', name: 'Celebrate', category: ['happy'] },
            { emoji: '🎊', name: 'Party Popper', category: ['happy'] },
            { emoji: '😄', name: 'Smile', category: ['happy'] },
            { emoji: '😁', name: 'Grin', category: ['happy', 'funny'] },
            { emoji: '🥺', name: 'Pleading', category: ['cute'] }
        ];

        const stickersGrid = document.getElementById('stickersGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryBtns = document.querySelectorAll('.category-btn');
        let currentCategory = 'all';

        function renderStickers(filteredStickers = stickers) {
            stickersGrid.innerHTML = '';
            filteredStickers.forEach(sticker => {
                const stickerCard = document.createElement('div');
                stickerCard.className = 'sticker-card';
                stickerCard.innerHTML = `
                    <div class="sticker-emoji" onclick="showModal('${sticker.emoji}', '${sticker.name}')">${sticker.emoji}</div>
                    <div class="sticker-name">${sticker.name}</div>
                    <button class="download-btn" onclick="copyEmoji('${sticker.emoji}')">
                        📱 WhatsApp
                    </button>
                `;
                stickersGrid.appendChild(stickerCard);
            });
        }

        function filterByCategory(category) {
            currentCategory = category;
            let filtered = stickers;
            
            if (category !== 'all') {
                filtered = stickers.filter(sticker => sticker.category.includes(category));
            }
            
            renderStickers(filtered);
        }

        function filterStickers() {
            const searchTerm = searchInput.value.toLowerCase();
            const categoryFiltered = currentCategory === 'all' ? stickers : 
                stickers.filter(sticker => sticker.category.includes(currentCategory));
            
            const searchFiltered = categoryFiltered.filter(sticker => 
                sticker.name.toLowerCase().includes(searchTerm)
            );
            
            renderStickers(searchFiltered);
        }

        function showModal(emoji, name) {
            document.getElementById('modalEmoji').textContent = emoji;
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('stickerModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('stickerModal').style.display = 'none';
        }

        function copyEmoji(emoji = '') {
            navigator.clipboard.writeText(emoji || document.getElementById('modalEmoji').textContent).then(() => {
                alert('✅ Emoji copied! Paste in WhatsApp 💚');
            });
        }

        function showRandomSticker() {
            const randomSticker = stickers[Math.floor(Math.random() * stickers.length)];
            showModal(randomSticker.emoji, randomSticker.name);
        }

        // Event Listeners
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterByCategory(btn.dataset.category);
            });
        });

        searchInput.addEventListener('input', filterStickers);

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('stickerModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initial render
        renderStickers();

        // Add some fun animations
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.sticker-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
                card.style.animation = 'fadeInUp 0.6s ease forwards';
            });
        });
    </script>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>
</html>
